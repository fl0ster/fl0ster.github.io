    //manifestUrl: "https://emilka-filip-wedding-photos-2026-014832599897-eu-north-1-an.s3.eu-north-1.amazonaws.com/manifest.json",
    manifestUrl: "https://d21v179qk7pdrs.cloudfront.net/manifest.json",

    // Bazowy adres S3, doklejany przed względnymi ścieżkami z manifestu.
    // Ścieżki w manifeście zaczynające się od "http" są używane bez zmian.
    // Zostaw "" jeśli w manifeście podajesz pełne adresy URL.
    // Przykład: "https://twoj-bucket.s3.eu-central-1.amazonaws.com/"  
    s3BaseUrl: "https://d21v179qk7pdrs.cloudfront.net",  
  };

<style>
  :root {
    --bg:        #14110e;
    --bg-soft:   #1c1814;
    --surface:   #211c17;
    --text:      #f3ece2;
    --muted:     #a89a87;
    --line:      rgba(243, 236, 226, 0.10);
    --accent:    #c9a96a;
    --accent-dk: #a98b52;
    --radius:    14px;
    --gap:       12px;
    --ease:      cubic-bezier(0.22, 1, 0.36, 1);
    --serif:     "Cormorant Garamond", Georgia, "Times New Roman", serif;
    --sans:      "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  /* Full-page background image — fades in once loaded */
  .page-bg {
    position: fixed;
    inset: 0;
    z-index: -2;
    background: url("page_bg.jpg") center / cover no-repeat;
    opacity: 0;
    transition: opacity 1.2s var(--ease);
    pointer-events: none;
    /* parallax: fixed scale just to cover edges; scroll only shifts it down */
    transform: scale(1.12) translateY(var(--bg-shift, 0px));
    transform-origin: center center;
    will-change: transform;
  }
  .page-bg.is-loaded { opacity: 1; }

  /* Gradient overlay kept on top of the image for readability */
  .page-bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg,
                rgba(20, 17, 14, 0.78),
                rgba(20, 17, 14, 0.88) 55%,
                rgba(20, 17, 14, 0.94));
  }

  /* Soft ambient glow behind the header */
  body::before {
    content: "";
    position: fixed;
    top: -30vh; left: 50%;
    transform: translateX(-50%);
    width: 120vw; height: 80vh;
    background: radial-gradient(ellipse at center,
                rgba(201, 169, 106, 0.14), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── Header ─────────────────────────────────────────────── */
  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1;
    text-align: center;
    padding: clamp(64px, 14vh, 140px) 20px clamp(36px, 7vh, 72px);
    /* pinned to viewport; fades + zooms on scroll instead of scrolling away */
    transform-origin: center top;
    will-change: transform, opacity;
    pointer-events: none;
  }

  .eyebrow {
    font-family: var(--sans);
    font-size: 0.72rem;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 22px;
    opacity: 0;
    animation: rise 1s var(--ease) 0.1s forwards;
  }

  h1 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: clamp(2.8rem, 11vw, 6rem);
    line-height: 1.02;
    letter-spacing: 0.01em;
    opacity: 0;
    animation: rise 1.1s var(--ease) 0.25s forwards;
  }
  h1 .amp {
    display: block;
    font-style: italic;
    font-size: 0.5em;
    color: var(--accent);
    margin: 0.12em 0;
    opacity: 0.95;
  }

  .subtitle {
    margin-top: 22px;
    color: var(--muted);
    font-size: clamp(0.9rem, 2.6vw, 1.05rem);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    opacity: 0;
    animation: rise 1.1s var(--ease) 0.45s forwards;
  }

  .divider {
    width: 0;
    height: 1px;
    margin: 34px auto 0;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: grow 1.4s var(--ease) 0.7s forwards;
  }

  @keyframes rise { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: none; } }
  @keyframes grow { from { width: 0; } to { width: min(220px, 60vw); } }

  /* ─── Toolbar ────────────────────────────────────────────── */
  .toolbar {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    padding: 0 20px clamp(28px, 5vh, 48px);
    opacity: 0;
    animation: rise 1s var(--ease) 0.6s forwards;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    font-family: var(--sans);
    font-size: 0.82rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    padding: 13px 24px;
    border-radius: 100px;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.35s var(--ease), background 0.35s var(--ease),
                border-color 0.35s var(--ease), box-shadow 0.35s var(--ease);
    -webkit-tap-highlight-color: transparent;
  }
  .btn svg { width: 17px; height: 17px; flex: none; }
  .btn:hover { transform: translateY(-2px); border-color: rgba(201,169,106,0.5); }
  .btn:active { transform: translateY(0); }

  .btn--primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-dk));
    color: #1a140a;
    border-color: transparent;
    font-weight: 600;
  }
  .btn--primary:hover { box-shadow: 0 10px 30px -8px rgba(201,169,106,0.5); }
  .btn[hidden] { display: none; }

  /* ─── Sticky download (re-appears at top after scrolling) ── */
  .sticky-download {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 50;
    display: flex;
    justify-content: center;
    padding: max(14px, env(safe-area-inset-top)) 20px 26px;
    background: rgba(0, 0, 0, 0.0);  
    pointer-events: none;
    opacity: 0;
    transform: translateY(-100%);
    transition: opacity 0.4s var(--ease), transform 0.4s var(--ease);
  }
  .sticky-download.show {
    opacity: 1;
    transform: none;
  }
  .sticky-download .btn { pointer-events: auto; }

  /* ─── Gallery (justified rows — no gaps, horizontal order) ─ */
  main { position: relative; z-index: 1; }

  .gallery {
    max-width: 1500px;
    margin: 0 auto;
    padding: 0 var(--gap) 80px;
  }

  .gallery-row {
    display: flex;
    gap: var(--gap);
    margin-bottom: var(--gap);
  }

  .tile {
    position: relative;
    display: block;
    margin: 0;
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    background: var(--bg-soft);
    border: none;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    /* hidden until revealed by IntersectionObserver */
    opacity: 0;
    transform: translateY(26px) scale(0.985);
    transition: opacity 0.7s var(--ease), transform 0.7s var(--ease),
                box-shadow 0.4s var(--ease);
    box-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  .tile.in {
    opacity: 1;
    transform: none;
  }
  .tile img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s var(--ease), filter 0.6s var(--ease);
  }
  .tile img.loaded { filter: none; }
  .tile img:not(.loaded) { filter: blur(14px); transform: scale(1.05); }

  @media (hover: hover) {
    .tile:hover { box-shadow: 0 20px 40px -16px rgba(0,0,0,0.6); }
    .tile:hover img.loaded { transform: scale(1.06); }
  }

  /* video play badge */
  .tile.video::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.18);
    pointer-events: none;
  }
  .tile .play {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 58px; height: 58px;
    border-radius: 50%;
    background: rgba(20,17,14,0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(243,236,226,0.4);
    display: grid; place-items: center;
    pointer-events: none;
    transition: transform 0.4s var(--ease), background 0.4s var(--ease);
  }
  @media (hover: hover) { .tile:hover .play { transform: translate(-50%,-50%) scale(1.12); background: rgba(201,169,106,0.85); } }
  .tile .play svg { width: 22px; height: 22px; margin-left: 3px; fill: var(--text); }

  /* ─── States ─────────────────────────────────────────────── */
  .status {
    position: relative; z-index: 1;
    text-align: center;
    color: var(--muted);
    padding: 60px 24px 120px;
    font-size: 0.95rem;
  }
  .status[hidden] { display: none; }
  .spinner {
    width: 34px; height: 34px;
    margin: 0 auto 18px;
    border: 2px solid var(--line);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status code {
    font-size: 0.82rem;
    background: var(--surface);
    padding: 2px 7px;
    border-radius: 6px;
    color: var(--accent);
  }

  /* ─── Lightbox ───────────────────────────────────────────── */
  .lb {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(10, 8, 6, 0.0);
    backdrop-filter: blur(0px);
    -webkit-backdrop-filter: blur(0px);
    display: flex;
    align-items: center;
    justify-content: center;
    visibility: hidden;
    transition: background 0.4s var(--ease), backdrop-filter 0.4s var(--ease),
                visibility 0s linear 0.4s;
  }
  .lb.open {
    visibility: visible;
    background: rgba(10, 8, 6, 0.94);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: background 0.4s var(--ease), backdrop-filter 0.4s var(--ease);
  }

  .lb__stage {
    position: relative;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: max(16px, env(safe-area-inset-top)) 16px max(16px, env(safe-area-inset-bottom));
  }

  .lb__media {
    max-width: min(94vw, 1500px);
    max-height: 86vh;
    border-radius: 8px;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,0.8);
    opacity: 0;
    transform: scale(0.94);
    transition: opacity 0.45s var(--ease), transform 0.45s var(--ease);
    object-fit: contain;
    background: var(--bg-soft);
  }
  .lb.open .lb__media.ready { opacity: 1; transform: none; }
  video.lb__media { width: auto; }

  .lb__nav, .lb__close {
    position: absolute;
    z-index: 2;
    display: grid; place-items: center;
    background: rgba(33,28,23,0.6);
    border: 1px solid var(--line);
    color: var(--text);
    cursor: pointer;
    border-radius: 50%;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: background 0.3s var(--ease), transform 0.3s var(--ease),
                opacity 0.3s var(--ease);
    -webkit-tap-highlight-color: transparent;
  }
  .lb__nav { top: 50%; transform: translateY(-50%); width: 52px; height: 52px; }
  .lb__nav:hover { background: rgba(201,169,106,0.85); color: #1a140a; }
  .lb__nav svg, .lb__close svg { width: 22px; height: 22px; }
  .lb__prev { left: 18px; }
  .lb__next { right: 18px; }
  .lb__nav[disabled] { opacity: 0.25; pointer-events: none; }

  .lb__close { top: 18px; right: 18px; width: 46px; height: 46px; }
  .lb__close:hover { background: rgba(201,169,106,0.85); color: #1a140a; }

  .lb__bar {
    position: absolute;
    left: 50%;
    bottom: max(18px, env(safe-area-inset-bottom));
    transform: translateX(-50%);
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .lb__counter {
    font-size: 0.82rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  .lb__loader {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1;
  }

  @media (max-width: 600px) {
    .lb__nav { width: 44px; height: 44px; }
    .lb__prev { left: 8px; } .lb__next { right: 8px; }
    .lb__media { max-height: 78vh; }
  }

  /* ─── Footer ─────────────────────────────────────────────── */
  footer {
    position: relative; z-index: 1;
    text-align: center;
    padding: 40px 20px 60px;
    color: var(--muted);
    font-size: 0.78rem;
    letter-spacing: 0.14em;
  }
  footer .heart { color: var(--accent); }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001s !important;
      transition-duration: 0.001s !important;
    }
    .eyebrow, h1, .subtitle, .toolbar { opacity: 1 !important; }
    .divider { width: min(220px,60vw) !important; }
    .tile { opacity: 1 !important; transform: none !important; }
    /* no pinned hero when motion is reduced — keep it in normal flow */
    header { position: relative !important; transform: none !important; opacity: 1 !important; }
  }
</style>

<body>
  <div class="page-bg" id="pageBg"></div>
  <header>

    <p class="eyebrow">Winnica Jura<br/>16.05.2026</p>

  <div class="toolbar">
    <a class="btn btn--primary" id="downloadAll" hidden download>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>

  <main>
    <div class="status" id="status">

    Z <span class="heart">&#9829;</span> - Emilka &amp; Filip
  </footer>

  <!-- Lightbox -->
  <div class="lb" id="lightbox" role="dialog" aria-modal="true" aria-label="Podgląd">
    <div class="lb__stage" id="lbStage">
      <button class="lb__close" id="lbClose" aria-label="Zamknij">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>

          Pobierz
        </button>

<script>
(function () {
  "use strict";

  var CONFIG = window.GALLERY_CONFIG || {};
  var S3 = (CONFIG.s3BaseUrl || "").replace(/\/?$/, CONFIG.s3BaseUrl ? "/" : "");

  // Resolve a manifest path: absolute URLs kept as-is, else prefixed with S3 base.
  function url(path) {
    if (!path) return "";
    if (/^https?:\/\//i.test(path) || /^\/\//.test(path)) return path;
    return S3 + path.replace(/^\//, "");
  }

  var els = {
    status:      document.getElementById("status"),
    gallery:     document.getElementById("gallery"),
    subtitle:    document.getElementById("subtitle"),
    downloadAll: document.getElementById("downloadAll"),
    stickyDownload:    document.getElementById("stickyDownload"),
    stickyDownloadBtn: document.getElementById("stickyDownloadBtn"),
    lb:          document.getElementById("lightbox"),
    lbStage:     document.getElementById("lbStage"),
    lbClose:     document.getElementById("lbClose"),
    lbPrev:      document.getElementById("lbPrev"),
    lbNext:      document.getElementById("lbNext"),
    lbCounter:   document.getElementById("lbCounter"),
    lbDownload:  document.getElementById("lbDownload"),
    lbLoader:    document.getElementById("lbLoader"),
  };

  var items = [];     // normalized media list
  var current = -1;   // open index in lightbox
  var currentMedia = null;

  // ── Load manifest ─────────────────────────────────────────
  fetch(CONFIG.manifestUrl, { cache: "no-cache" })
    .then(function (r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    })
    .then(init)
    .catch(function (err) {
      els.status.innerHTML =
        "Nie udało się wczytać galerii.<br><br>" +
        "Sprawdź adres <code>manifestUrl</code> oraz ustawienia CORS na S3.<br>" +
        "<small style='opacity:.6'>(" + String(err.message || err) + ")</small>";
    });

  function init(data) {
    if (data.title) {
      var h1 = document.querySelector("h1");
      // Keep the styled ampersand if title contains " & "
      if (/\s&\s/.test(data.title)) {
        var parts = data.title.split(/\s&\s/);
        h1.innerHTML = parts[0] + '<span class="amp">&amp;</span>' + parts.slice(1).join(" & ");
      } else {
        h1.textContent = data.title;
      }
      document.title = data.title + " — Galeria";
    }
    if (data.subtitle) els.subtitle.textContent = data.subtitle;

    if (data.zipUrl) {
      var zip = url(data.zipUrl);
      els.downloadAll.href = zip;
      els.downloadAll.hidden = false;
      els.stickyDownloadBtn.href = zip;
      setupStickyDownload();
    }

    var list = data.items || data.photos || [];
    items = list.map(normalize).filter(Boolean);

    if (!items.length) {
      els.status.textContent = "Galeria jest jeszcze pusta.";
      return;
    }

    els.status.hidden = true;
    render();
  }

  function normalize(it) {
    if (!it) return null;
    if (typeof it === "string") it = { full: it };
    var full = it.full || it.src || it.url || it.image;
    if (!full) return null;
    var isVideo = it.type === "video" ||
                  /\.(mp4|mov|webm|m4v)(\?|$)/i.test(full);
    return {
      type:  isVideo ? "video" : "photo",
      thumb: url(it.thumb || it.thumbnail || full),
      full:  url(full),
      name:  it.name || full.split("/").pop().split("?")[0],
      w:     it.width  || it.w,
      h:     it.height || it.h,
    };
  }

  // ── Render grid ───────────────────────────────────────────
  var io = ("IntersectionObserver" in window)
    ? new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); }
        });
      }, { rootMargin: "200px 0px" })
    : null;

  var tiles = [];   // { el, ar }  — kept in manifest order

  function render() {
    items.forEach(function (it, i) {
      var tile = document.createElement("button");
      tile.className = "tile" + (it.type === "video" ? " video" : "");
      tile.type = "button";
      tile.setAttribute("aria-label", it.type === "video" ? "Odtwórz film" : "Powiększ zdjęcie");

      // aspect ratio (width / height); fall back until the image reports its size
      var rec = { el: tile, ar: (it.w && it.h) ? (it.w / it.h) : 1.5 };

      var img = new Image();
      img.loading = "lazy";
      img.decoding = "async";
      img.alt = "";
      img.src = it.thumb;
      img.addEventListener("load", function () {
        img.classList.add("loaded");
        if (img.naturalWidth && img.naturalHeight) {
          var ar = img.naturalWidth / img.naturalHeight;
          if (Math.abs(ar - rec.ar) > 0.001) { rec.ar = ar; scheduleLayout(); }
        }
      });
      if (img.complete) img.classList.add("loaded");
      tile.appendChild(img);

      if (it.type === "video") {
        var play = document.createElement("span");
        play.className = "play";
        play.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
        tile.appendChild(play);
      }

      tile.addEventListener("click", function () { open(i); });

      // staggered reveal
      if (io) {
        tile.style.transitionDelay = Math.min(i, 8) * 45 + "ms";
        io.observe(tile);
      } else {
        tile.classList.add("in");
      }

      tiles.push(rec);
    });
    layout();
  }

  // ── Justified-rows layout: each row scales to fill full width ──
  function targetRowHeight(w) {
    if (w <= 420) return 200;
    if (w <= 760) return 220;
    return 280;
  }

  function layout() {
    if (!tiles.length) return;
    var gapPx  = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--gap")) || 12;
    var avail  = els.gallery.clientWidth -
                 parseFloat(getComputedStyle(els.gallery).paddingLeft) -
                 parseFloat(getComputedStyle(els.gallery).paddingRight);
    if (avail <= 0) return;
    var target = targetRowHeight(window.innerWidth);

    var frag = document.createDocumentFragment();
    var row = [], arSum = 0;

    function flush(stretch) {
      if (!row.length) return;
      var gaps   = gapPx * (row.length - 1);
      // height that makes this row's images exactly fill the available width
      var height = stretch ? (avail - gaps) / arSum : target;
      var rowEl  = document.createElement("div");
      rowEl.className = "gallery-row";
      row.forEach(function (rec) {
        rec.el.style.width  = Math.round(height * rec.ar) + "px";
        rec.el.style.height = Math.round(height) + "px";
        rowEl.appendChild(rec.el);
      });
      frag.appendChild(rowEl);
      row = []; arSum = 0;
    }

    tiles.forEach(function (rec) {
      row.push(rec);
      arSum += rec.ar;
      // width of the row at the target height, including gaps
      var rowWidth = target * arSum + gapPx * (row.length - 1);
      if (rowWidth >= avail) flush(true);
    });
    flush(false);   // last (partial) row keeps the target height, left-aligned

    els.gallery.innerHTML = "";
    els.gallery.appendChild(frag);
  }

  var layoutTimer = null;
  function scheduleLayout() {
    if (layoutTimer) return;
    layoutTimer = requestAnimationFrame(function () { layoutTimer = null; layout(); });
  }

  var resizeTimer = null;
  window.addEventListener("resize", function () {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(layout, 150);
  });

  // ── Lightbox ──────────────────────────────────────────────
  function open(i) {
    current = i;
    document.body.style.overflow = "hidden";
    els.lb.classList.add("open");
    show(i);
  }

  function close() {
    els.lb.classList.remove("open");
    document.body.style.overflow = "";
    if (currentMedia && currentMedia.tagName === "VIDEO") currentMedia.pause();
    setTimeout(function () {
      if (currentMedia) { currentMedia.remove(); currentMedia = null; }
    }, 420);
    current = -1;
  }

  function show(i) {
    var it = items[i];
    if (!it) return;

    if (currentMedia) currentMedia.remove();
    els.lbLoader.style.display = "block";

    var node;
    if (it.type === "video") {
      node = document.createElement("video");
      node.src = it.full;
      node.controls = true;
      node.autoplay = true;
      node.playsInline = true;
      node.preload = "metadata";
      node.addEventListener("loadeddata", revealed);
    } else {
      node = new Image();
      // blur-up: show thumb instantly, then swap to full-res
      node.src = it.thumb;
      var full = new Image();
      full.onload = function () { node.src = it.full; revealed(); };
      full.onerror = revealed;
      full.src = it.full;
    }
    node.classList.add("lb__media");
    els.lbStage.appendChild(node);
    // force reflow then reveal for transition
    requestAnimationFrame(function () { node.classList.add("ready"); });
    currentMedia = node;

    function revealed() { els.lbLoader.style.display = "none"; }

    els.lbCounter.textContent = (i + 1) + " / " + items.length;
    els.lbPrev.disabled = (i <= 0);
    els.lbNext.disabled = (i >= items.length - 1);
    preload(i + 1); preload(i - 1);
  }

  function preload(i) {
    var it = items[i];
    if (it && it.type === "photo") { var im = new Image(); im.src = it.full; }
  }

  function go(delta) {
    var n = current + delta;
    if (n < 0 || n >= items.length) return;
    current = n;
    show(n);
  }

  // ── Download (force download even cross-origin via blob) ──
  function download(it) {
    if (!it) return;
    var btn = els.lbDownload;
    var orig = btn.innerHTML;
    btn.innerHTML = '<div class="spinner" style="width:16px;height:16px;margin:0;border-width:2px"></div> Pobieram…';
    btn.disabled = true;

    fetch(it.full, { mode: "cors" })
      .then(function (r) { if (!r.ok) throw new Error(r.status); return r.blob(); })
      .then(function (blob) {
        var a = document.createElement("a");
        var u = URL.createObjectURL(blob);
        a.href = u; a.download = it.name || "zdjecie";
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(function () { URL.revokeObjectURL(u); }, 4000);
      })
      .catch(function () {
        // CORS blocked → fall back to opening the file in a new tab
        var a = document.createElement("a");
        a.href = it.full; a.download = it.name || ""; a.target = "_blank"; a.rel = "noopener";
        document.body.appendChild(a); a.click(); a.remove();
      })
      .finally(function () { btn.innerHTML = orig; btn.disabled = false; });
  }

  // ── Events ────────────────────────────────────────────────
  els.lbClose.addEventListener("click", close);
  els.lbPrev.addEventListener("click", function () { go(-1); });
  els.lbNext.addEventListener("click", function () { go(1); });
  els.lbDownload.addEventListener("click", function () { download(items[current]); });

  els.lb.addEventListener("click", function (e) {
    // click on the dark backdrop (stage) closes; clicks on media/buttons don't
    if (e.target === els.lb || e.target === els.lbStage) close();
  });

  document.addEventListener("keydown", function (e) {
    if (current < 0) return;
    if (e.key === "Escape") close();
    else if (e.key === "ArrowLeft") go(-1);
    else if (e.key === "ArrowRight") go(1);
  });

  // touch swipe in lightbox
  var tx = 0, ty = 0;
  els.lbStage.addEventListener("touchstart", function (e) {
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
  }, { passive: true });
  els.lbStage.addEventListener("touchend", function (e) {
    var dx = e.changedTouches[0].clientX - tx;
    var dy = e.changedTouches[0].clientY - ty;
    if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy)) go(dx < 0 ? 1 : -1);
    else if (dy > 90 && Math.abs(dy) > Math.abs(dx)) close();
  }, { passive: true });

  // Fade in the page background once the image has fully loaded
  var pageBg = document.getElementById("pageBg");
  if (pageBg) {
    var bgImg = new Image();
    bgImg.onload = function () { pageBg.classList.add("is-loaded"); };
    bgImg.src = "page_bg.jpg";
    if (bgImg.complete) pageBg.classList.add("is-loaded");
  }

  // ── Sticky download: re-show the button once the original scrolls off ──
  function setupStickyDownload() {
    function update() {
      // show once the toolbar button has scrolled above the viewport
      var show = els.downloadAll.getBoundingClientRect().bottom <= 0;
      els.stickyDownload.classList.toggle("show", show);
      els.stickyDownload.setAttribute("aria-hidden", show ? "false" : "true");
    }

    if ("IntersectionObserver" in window) {
      var obs = new IntersectionObserver(function (entries) {
        var e = entries[0];
        var show = !e.isIntersecting && e.boundingClientRect.top < 0;
        els.stickyDownload.classList.toggle("show", show);
        els.stickyDownload.setAttribute("aria-hidden", show ? "false" : "true");
      }, { threshold: 0 });
      obs.observe(els.downloadAll);
    } else {
      window.addEventListener("scroll", update, { passive: true });
      update();
    }
  }

  // ── Parallax: pinned header fades/zooms, background eases down ──
  var headerEl = document.querySelector("header");
  var reduceMotion = window.matchMedia &&
                     window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  // Header is position:fixed, so push the rest of the page below it.
  function syncHeaderOffset() {
    if (headerEl) document.body.style.paddingTop = headerEl.offsetHeight + "px";
  }
  if (headerEl && !reduceMotion) {
    syncHeaderOffset();
    window.addEventListener("resize", syncHeaderOffset);
    window.addEventListener("load", syncHeaderOffset);
  }

  if (!reduceMotion && (pageBg || headerEl)) {
    var ticking = false;

    function onParallax() {
      var vh = (window.innerHeight || 1) * 0.6;
      var p = Math.min(Math.max(window.pageYOffset / vh, 0), 1); // 0 → 1 over first page

      if (pageBg) {
        // no zoom on scroll — just ease the background downward
        pageBg.style.setProperty("--bg-shift", (p * 60).toFixed(1) + "px");
      }
      if (headerEl) {
        // stay in place, fade out while zooming in
        headerEl.style.opacity = (1 - p).toFixed(3);
        headerEl.style.transform = "scale(" + (1 - p * 0.2).toFixed(4) + ")";
      }
      ticking = false;
    }

    window.addEventListener("scroll", function () {
      if (!ticking) { ticking = true; requestAnimationFrame(onParallax); }
    }, { passive: true });

    onParallax(); // set initial state (e.g. when reloaded mid-page)
  }

})();
</script>
</body>
</html>
